<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b2440"/>
      <stop offset="1" stop-color="#161420"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8a4c"/>
      <stop offset="1" stop-color="#ff5d73"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bg)"/>

  <!-- camera body -->
  <rect x="48" y="80" width="160" height="112" rx="24" fill="none" stroke="url(#accent)" stroke-width="12"/>
  <!-- viewfinder bump -->
  <path d="M104 80 l10 -20 h28 l10 20 z" fill="url(#accent)"/>
  <!-- lens -->
  <circle cx="128" cy="138" r="34" fill="none" stroke="url(#accent)" stroke-width="12"/>
  <circle cx="128" cy="138" r="12" fill="url(#accent)"/>

  <!-- claw scratches across the lens -->
  <g stroke="#ffffff" stroke-width="9" stroke-linecap="round" opacity="0.92">
    <line x1="92" y1="104" x2="172" y2="184"/>
    <line x1="108" y1="98" x2="188" y2="178"/>
    <line x1="124" y1="94" x2="204" y2="174"/>
  </g>
</svg>
